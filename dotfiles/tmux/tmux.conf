set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm*:Tc"

################################################################################
# BASIC OPTIONS
################################################################################
#set utf8-default on
#set-window-option -g utf8 on
set -g default-shell $SHELL
set -g mouse on
set -g set-clipboard on
set -g display-time 4000
set -g status-interval 5
set -g history-limit 1000000
set -sg escape-time 0

# Start numbering at 1
set -g renumber-windows on
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1


################################################################################
# COLORS - Orange and Teal Theme (matching Alacritty)
################################################################################
thm_bg="#005F60"
thm_bg_dark="#062027"
thm_fg="#f78104"
thm_red="#ff4500"
thm_green="#8ec07c"
thm_blue="#268bd2"
thm_magenta="#a277ff"
thm_cyan="#2aa198"
thm_white="#a6b2b2"


################################################################################
# KEY BINDINGS
################################################################################
unbind C-b
set -g prefix C-t
set -g repeat-time 0
set -g focus-events on

# Split panes with |  - or v  s
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# vimlike pane switching
bind -r k select-pane -U 
bind -r j select-pane -D 
bind -r h select-pane -L 
bind -r l select-pane -R 

# Resizing panes
bind -r C-k resize-pane -U 5
bind -r C-j resize-pane -D 5
bind -r C-h resize-pane -L 5
bind -r C-l resize-pane -R 5

# Moving windows
bind -n C-S-Left swap-window -t -1 \; previous-window
bind -n C-S-Right swap-window -t +1 \; next-window

# Copy to system clipboard using xclip
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel "xclip -in -selection clipboard"

# kill pane with <prefix> q
bind -r q kill-pane -a

# reload tmux config with <prefix> r
bind r source-file ~/.config/tmux/tmux.conf \; display "TMUX config reloaded!"


################################################################################
# LOOK AND FEEL
################################################################################
# Status bar
set -g status "on"
set -g status-bg "${thm_bg}"
set -g status-justify "left"
set -g status-position "bottom"
set -g status-left " "
set -g status-right " "
set -g status-left-length "100"
set -g status-right-length "100"

# Statusline - other windows
set -g window-status-format " #I "
set -g window-status-style "fg=${thm_fg},dim"

# Statusline - current window
set -g window-status-current-format "[#I]"
set -g window-status-current-style "fg=${thm_fg},bold"

# Messages
set -g message-style "fg=${thm_fg},bg=${thm_bg_dark},align=centre"
set -g message-command-style "fg=${thm_fg},bg=${thm_bg_dark},align=centre"

# Panes
set -g pane-border-style "fg=${thm_fg},dim"
set -g pane-active-border-style "fg=${thm_fg}"

# Statusline - right side
# set -g status-right "#[fg=${thm_fg},bg=${thm_bg},nobold,nounderscore,noitalics]#[fg=${thm_bg},bg=${thm_fg},nobold,nounderscore,noitalics] #W "


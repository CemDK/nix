# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# You can use it to add commands that run after login to macOS user session.
# 'start-at-login' needs to be 'true' for 'after-login-command' to work
# Available commands: https://nikitabobko.github.io/AeroSpace/commands
after-login-command = []

# You can use it to add commands that run after AeroSpace startup.
# 'after-startup-command' is run after 'after-login-command'
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
# after-startup-command = [
#       'exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=5.0'
# ]

# Start AeroSpace at login
# start-at-login = true
# Enable normalization for better window management
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Layout configuration
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
accordion-padding = 30

# Mouse follows focus when monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Gaps configuration (matching glazewm outer gaps)
[gaps]
    inner.horizontal = 0
    inner.vertical = 0
    outer.left = 20
    outer.bottom = 20
    outer.top = 20
    outer.right = 20

# ---------------------------------------------------------------------------
# FLOATING
# ---------------------------------------------------------------------------
[[on-window-detected]]
    if.app-id = 'app.zen-browser.zen'
    if.window-title-regex-substring = 'Picture-in-Picture'
    run = ['layout floating']

[[on-window-detected]]
    if.app-id = 'com.apple.calculator'
    run = ['layout floating']

[[on-window-detected]]
    if.app-id = 'com.apple.ActivityMonitor'
    run = ['layout floating']


# ---------------------------------------------------------------------------
# WORKSPACE 1
# ---------------------------------------------------------------------------
[[on-window-detected]]
    if.app-id = 'app.zen-browser.zen'
    run = ['move-node-to-workspace 1']

[[on-window-detected]]
    if.app-id = 'org.mozilla.firefox'
    run = ['move-node-to-workspace 1']

[[on-window-detected]]
    if.app-id = 'com.apple.safari'
    run = ['move-node-to-workspace 1']

# ---------------------------------------------------------------------------
# WORKSPACE 2
# ---------------------------------------------------------------------------
[[on-window-detected]]
    if.app-id = 'org.alacritty'
    run = ['move-node-to-workspace 2']

# ---------------------------------------------------------------------------
# WORKSPACE 3
# ---------------------------------------------------------------------------
[[on-window-detected]]
    if.app-name-regex-substring = 'neovide'
    run = ['layout tiling', 'move-node-to-workspace 3']

# ---------------------------------------------------------------------------
# WORKSPACE 4
# ---------------------------------------------------------------------------
[[on-window-detected]]
    if.app-id = 'com.apple.finder'
    run = ['move-node-to-workspace 4']

[[on-window-detected]]
    if.app-id = 'com.microsoft.VSCode'
    run = ['move-node-to-workspace 4']

[[on-window-detected]]
    if.app-id = 'com.wireguard.macos'
    run = ['move-node-to-workspace 4']

# ---------------------------------------------------------------------------
# WORKSPACE 5
# ---------------------------------------------------------------------------
[[on-window-detected]]
    if.app-id = 'com.blackmagic-design.DaVinciResolveLite'
    run = ['move-node-to-workspace 5']

[[on-window-detected]]
    if.app-id = 'com.anthropic.claudefordesktop'
    run = ['move-node-to-workspace 5']

# ---------------------------------------------------------------------------
# WORKSPACE 6
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# WORKSPACE 7
# ---------------------------------------------------------------------------
[[on-window-detected]]
    if.app-id = 'md.obsidian'
    run = ['move-node-to-workspace 7']

[[on-window-detected]]
    if.app-id = 'net.ankiweb.launcher'
    run = ['move-node-to-workspace 7']

# ---------------------------------------------------------------------------
# WORKSPACE 8
# ---------------------------------------------------------------------------
[[on-window-detected]]
    if.app-id = 'tv.plex.desktop'
    run = ['move-node-to-workspace 8']

# ---------------------------------------------------------------------------
# WORKSPACE 9
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# WORKSPACE 10
# ---------------------------------------------------------------------------
[[on-window-detected]]
    if.app-id = 'com.discord.Discord'
    run = ['move-node-to-workspace 10']

# ---------------------------------------------------------------------------
# KEYBINDINGS
# ---------------------------------------------------------------------------
[workspace-to-monitor-force-assignment]
    0 = 'secondary'  # workspace on second monitor
    1 = 'main'       # Browser on main monitor
    2 = 'main'       # Terminal on main monitor
    3 = 'main'       # Editor on main monitor
    4 = 'main'       # Explorer on main monitor
    5 = 'main'       # Games on main monitor
    6 = 'main'       # Others on main monitor
    7 = 'main'       # Obsidian on main monitor
    8 = 'main'       # Misc on main monitor
    9 = 'main'       # Launchers on main monitor
    10 = 'main'      # Stuff on main monitor

# Main binding mode (equivalent to glazewm keybindings)
[mode.main.binding]
    # Focus navigation (matching glazewm focus bindings)
    cmd-left = 'focus left'
    cmd-right = 'focus right'
    cmd-up = 'focus up'
    cmd-down = 'focus down'

    # Alternative focus bindings (ctrl+alt+hjkl like in glazewm)
    ctrl-cmd-h = 'focus left'
    ctrl-cmd-l = 'focus right'
    ctrl-cmd-k = 'focus up'
    ctrl-cmd-j = 'focus down'

    # Move windows (matching glazewm move bindings)
    cmd-shift-h = 'move left'
    cmd-shift-l = 'move right'
    cmd-shift-k = 'move up'
    cmd-shift-j = 'move down'
    cmd-shift-left = 'move left'
    cmd-shift-right = 'move right'
    cmd-shift-up = 'move up'
    cmd-shift-down = 'move down'

    # Resize windows
    cmd-u = 'resize smart -50'
    cmd-o = 'resize smart +50'

    # Toggle floating (matching glazewm left-alt+shift+space and left-alt+c)
    cmd-shift-space = 'layout floating tiling'
    cmd-c = 'layout floating tiling'

    # Toggle tiling
    cmd-t = 'layout tiling'

    # Toggle layout direction (matching glazewm left-alt+v)
    cmd-v = 'layout tiles horizontal vertical'

    # Close window (matching glazewm left-alt+q)
    # cmd-q reserved for macOS quit

    # Workspace navigation (matching glazewm workspace bindings)
    cmd-f = 'workspace 1'
    cmd-h = 'workspace 0'
    cmd-j = 'workspace 2'
    cmd-k = 'workspace 3'
    cmd-l = 'workspace 4'
    cmd-semicolon = 'workspace 5'

    cmd-0 = 'workspace 0'
    cmd-1 = 'workspace 1'
    cmd-2 = 'workspace 2'
    cmd-3 = 'workspace 3'
    cmd-4 = 'workspace 4'
    cmd-5 = 'workspace 5'
    cmd-6 = 'workspace 6'
    cmd-7 = 'workspace 7'
    cmd-8 = 'workspace 8'
    cmd-9 = 'workspace 9'

    # Move window to workspace and follow (matching glazewm behavior)
    cmd-shift-1 = ['move-node-to-workspace 1', 'workspace 1']
    cmd-shift-2 = ['move-node-to-workspace 2', 'workspace 2']
    cmd-shift-3 = ['move-node-to-workspace 3', 'workspace 3']
    cmd-shift-4 = ['move-node-to-workspace 4', 'workspace 4']
    cmd-shift-5 = ['move-node-to-workspace 5', 'workspace 5']
    cmd-shift-6 = ['move-node-to-workspace 6', 'workspace 6']
    cmd-shift-7 = ['move-node-to-workspace 7', 'workspace 7']
    cmd-shift-8 = ['move-node-to-workspace 8', 'workspace 8']
    cmd-shift-9 = ['move-node-to-workspace 9', 'workspace 9']

    # Navigate between workspaces (matching glazewm left-alt+s/left-alt+n and left-alt+a/left-alt+p)
    cmd-s = 'workspace --wrap-around next'
    cmd-n = 'workspace --wrap-around next'
    cmd-a = 'workspace --wrap-around prev'
    cmd-p = 'workspace --wrap-around prev'

    # Focus recent workspace (matching glazewm left-alt+d)
    cmd-d = 'workspace-back-and-forth'

    # Move workspace between monitors (matching glazewm workspace movement)
    cmd-shift-a = 'move-workspace-to-monitor --wrap-around next'
    cmd-shift-f = 'move-workspace-to-monitor --wrap-around next'
    cmd-shift-d = 'move-workspace-to-monitor --wrap-around next'
    cmd-shift-s = 'move-workspace-to-monitor --wrap-around next'

    # Enter resize mode (matching glazewm left-alt+r)
    cmd-r = 'mode resize'

    # Reload config (matching glazewm left-alt+shift+r)
    cmd-shift-r = 'reload-config'

    # Service mode for advanced operations
    cmd-shift-semicolon = 'mode service'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
    # cmd-tab reserved for macOS app switcher

# Resize mode (matching glazewm resize mode)
[mode.resize.binding]
    h = 'resize smart -50'
    left = 'resize smart -50'
    l = 'resize smart +50'
    right = 'resize smart +50'
    k = 'resize smart -50'
    up = 'resize smart -50'
    j = 'resize smart +50'
    down = 'resize smart +50'

    # Exit resize mode
    enter = 'mode main'
    esc = 'mode main'

# Service mode for system operations
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
    backspace = ['close-all-windows-but-current', 'mode main']


# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# ==============================================================================
# WORKSPACE RULES
# ==============================================================================

# ---------------------------------------------------------------------------
# WORKSPACE 1 - Browser
# ---------------------------------------------------------------------------
windowrule = match:class ^(zen|firefox|Firefox)$, workspace 1
windowrule = match:title ^(Mozilla Firefox)$, workspace 1

# ---------------------------------------------------------------------------
# WORKSPACE 0/10 - Edge
# ---------------------------------------------------------------------------
windowrule = match:class ^(microsoft-edge|msedge|Edge)$, workspace 10

# ---------------------------------------------------------------------------
# WORKSPACE 2 - Terminal
# ---------------------------------------------------------------------------
windowrule = match:class ^([Tt]erminal|Alacritty|kitty|foot)$, workspace 2

# ---------------------------------------------------------------------------
# WORKSPACE 3 - Editor
# ---------------------------------------------------------------------------
windowrule = match:class ^(code|Code|VSCodium|neovide)$, workspace 3
windowrule = match:title ^(Visual Studio Code)$, workspace 3
windowrule = match:title ^(Microsoft Visual Studio 2022)$, workspace 3

# ---------------------------------------------------------------------------
# WORKSPACE 4 - File Manager
# ---------------------------------------------------------------------------
windowrule = match:class ^(thunar|pcmanfm|nautilus|dolphin|org.kde.dolphin|nemo)$, workspace 4

# ---------------------------------------------------------------------------
# WORKSPACE 6 - Anki
# ---------------------------------------------------------------------------
windowrule = match:class ^([Aa]nki)$, workspace 6

# ---------------------------------------------------------------------------
# WORKSPACE 7 - Obsidian
# ---------------------------------------------------------------------------
windowrule = match:class ^(obsidian|Obsidian)$, workspace 7

# ---------------------------------------------------------------------------
# WORKSPACE 8 - Misc
# ---------------------------------------------------------------------------
windowrule = match:class ^(vlc|mpv|org.gnome.Nautilus.+|SumatraPDF)$, workspace 8
windowrule = match:title ^(Plex)$, workspace 8
windowrule = match:class ^(Unity Hub|Unity)$, workspace 8
windowrule = match:title ^([Vv]irtual[Bb]ox)$, workspace 8

# ---------------------------------------------------------------------------
# WORKSPACE 9 - Games
# ---------------------------------------------------------------------------
windowrule = match:class ^([Ss]team|[Ee]pic[Gg]ames[Ll]auncher|[Dd]iscord|[Mm]inecraft.*)$, workspace 9
windowrule = match:title ^(GOG Galaxy)$, workspace 9

# ==============================================================================
# FLOATING RULES
# ==============================================================================
windowrule = match:title ^(Calculator|calc|Rechner)$, float on
windowrule = match:title ^(Task Manager|Task-Manager)$, float on
windowrule = match:class ^(Bitwarden)$, float on
windowrule = match:title ^(Extension.*Bitwarden.*)$, float on
windowrule = match:title ^([Mm]inecraft [Ll]auncher)$, float on
windowrule = match:title ^([Vv]irtual[Bb]ox Manager)$, float on

# ==============================================================================
# GENERAL WINDOW RULES
# ==============================================================================
# Scroll nicely in the terminal
windowrule = match:class (Alacritty|kitty), scroll_touchpad 1.5

# Ignore maximize requests from apps. You'll probably like this.
# windowrule = match:class .*, suppress_event maximize

# Fix some dragging issues with XWayland
# windowrule = match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0, no_focus on
# this messes up some apps like unity floating windows...........


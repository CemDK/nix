# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# ---------------------------------------------------------------------------
# WORKSPACE 1 - Browser
# ---------------------------------------------------------------------------
windowrulev2 = workspace 1, class:^(zen|firefox|Firefox)$
windowrulev2 = workspace 1, title:^(Mozilla Firefox)$

# ---------------------------------------------------------------------------
# WORKSPACE 0/10 - Edge
# ---------------------------------------------------------------------------
windowrulev2 = workspace 10, class:^(microsoft-edge|msedge|Edge)$

# ---------------------------------------------------------------------------
# WORKSPACE 2 - Terminal
# ---------------------------------------------------------------------------
windowrulev2 = workspace 2, class:^([Tt]erminal|Alacritty|kitty|foot)$

# ---------------------------------------------------------------------------
# WORKSPACE 3 - Editor
# ---------------------------------------------------------------------------
windowrulev2 = workspace 3, class:^(code|Code|VSCodium|neovide)$
windowrulev2 = workspace 3, title:^(Visual Studio Code)$
windowrulev2 = workspace 3, title:^(Microsoft Visual Studio 2022)$

# ---------------------------------------------------------------------------
# WORKSPACE 4 - File Manager
# ---------------------------------------------------------------------------
windowrulev2 = workspace 4, class:^(thunar|pcmanfm|nautilus|dolphin|org.kde.dolphin|nemo)$

# ---------------------------------------------------------------------------
# WORKSPACE 6 - Anki
# ---------------------------------------------------------------------------
windowrulev2 = workspace 6, class:^([Aa]nki)$

# ---------------------------------------------------------------------------
# WORKSPACE 7 - Obsidian
# ---------------------------------------------------------------------------
windowrulev2 = workspace 7, class:^(obsidian|Obsidian)$

# ---------------------------------------------------------------------------
# WORKSPACE 8 - Misc
# ---------------------------------------------------------------------------
windowrulev2 = workspace 8, class:^(vlc|mpv|org.gnome.Nautilus.+|SumatraPDF)$
windowrulev2 = workspace 8, title:^(Plex)$
windowrulev2 = workspace 8, class:^(Unity Hub|Unity)$
windowrulev2 = workspace 8, title:^([Vv]irtual[Bb]ox)$

# ---------------------------------------------------------------------------
# WORKSPACE 9 - Games
# ---------------------------------------------------------------------------
windowrulev2 = workspace 9, class:^([Ss]team|[Ee]pic[Gg]ames[Ll]auncher|[Dd]iscord|[Mm]inecraft.*)$
windowrulev2 = workspace 9, title:^(GOG Galaxy)$

# ---------------------------------------------------------------------------
# FLOATING RULES
# ---------------------------------------------------------------------------
windowrulev2 = float, title:^(Calculator|calc|Rechner)$
windowrulev2 = float, title:^(Task Manager|Task-Manager)$
windowrulev2 = float, class:^(Bitwarden)$
windowrulev2 = float, title:^(Extension.*Bitwarden.*)$
windowrulev2 = float, title:^([Mm]inecraft [Ll]auncher)$
windowrulev2 = float, title:^([Vv]irtual[Bb]ox Manager)$

# ---------------------------------------------------------------------------
# GENERAL WINDOW RULES
# ---------------------------------------------------------------------------
# Scroll nicely in the terminal
windowrule = scrolltouchpad 1.5, class:(Alacritty|kitty)false

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0



###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
# Set programs that you use
$terminal = alacritty
$fileManager = dolphin
$menu = walker

# See https://wiki.hyprland.org/Configuring/Keywords/
# $mainMod = SUPER # Sets "Windows" key as main modifier
$mainMod = ALT # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
# Window management
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, E, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod SHIFT, SPACE, togglefloating,
bind = $mainMod, C, togglefloating,  # centered floating
bind = $mainMod, T, pseudo,  # pseudo-tiling
bind = $mainMod, V, togglesplit,  # toggle split direction
bind = $mainMod, M, togglespecialworkspace, minimize  # minimize approximation
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, Tab, cyclenext
bind = $mainMod SHIFT, F, fullscreen, immediate

bind = SUPER,  SPACE, exec, ~/.config/nix/scripts/system-menu.sh

bind = $mainMod SHIFT, R, exec, pkill waybar; hyprctl dispatch exec waybar

# Move focus with mainMod + arrow keys or CTRL+ALT+hjkl
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = CTRL ALT, H, movefocus, l
bind = CTRL ALT, L, movefocus, r
bind = CTRL ALT, K, movefocus, u
bind = CTRL ALT, J, movefocus, d

# Move windows with ALT+SHIFT+hjkl or ALT+SHIFT+arrows
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Resize windows
bind = $mainMod, U, resizeactive, -40 0
bind = $mainMod, O, resizeactive, 0 40

# Resize mode (ALT+R to enter, hjkl/arrows to resize, enter/escape to exit)
bind = $mainMod, R, submap, resize
submap = resize
binde = , H, resizeactive, -40 0
binde = , L, resizeactive, 40 0
binde = , K, resizeactive, 0 -40
binde = , J, resizeactive, 0 40
binde = , left, resizeactive, -40 0
binde = , right, resizeactive, 40 0
binde = , up, resizeactive, 0 -40
binde = , down, resizeactive, 0 40
bind = , escape, submap, reset
bind = , return, submap, reset
submap = reset

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Alternative workspace bindings (matching GlazeWM)
bind = $mainMod, H, workspace, 10  # alt+h -> workspace 0
bind = $mainMod, F, workspace, 1   # alt+f -> workspace 1
bind = $mainMod, J, workspace, 2   # alt+j -> workspace 2
bind = $mainMod, K, workspace, 3   # alt+k -> workspace 3
bind = $mainMod, L, workspace, 4   # alt+l -> workspace 4
bind = $mainMod, semicolon, workspace, 5  # alt+; -> workspace 5

# Navigate workspaces
bind = $mainMod, S, workspace, e+1  # next workspace
bind = $mainMod, N, workspace, e+1  # next workspace (alt)
bind = $mainMod, A, workspace, e-1  # previous workspace
bind = $mainMod, P, workspace, e-1  # previous workspace (alt)
bind = $mainMod, D, workspace, previous  # recent workspace

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad)
bind = $mainMod, minus, togglespecialworkspace, magic
bind = $mainMod SHIFT, minus, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindel = ,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindel = ,XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindel = ,XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = ,XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


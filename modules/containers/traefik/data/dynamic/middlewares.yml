http:
  middlewares:
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true

    dashboard-auth:
      basicAuth:
        usersFile: /etc/traefik/dynamic/dashboard-users

    vpn-whitelist:
      ipAllowList:
        sourceRange:
          - 192.168.2.0/24
          - 192.168.178.0/24
          - 100.64.0.0/10
          - 127.0.0.1/8

---
# Homepage configuration
# See https://fontawesome.com/v5/search for icons options

# Optional: Use external configuration file.
# Using this will ignore remaining config in this file
# externalConfig: https://example.com/server-luci/config.yaml

title: "CEMDK NIXOS"
subtitle: "Dashboard"
logo: "assets/icons/logo.png"
#icon: "fas fa-skull-crossbones"
assetsFolder: /www/assets
# documentTitle: "Welcome" # Customize the browser tab text

header: true
footer: false #'<p>CEMDK</p>' # false if you want to hide it

# "auto" or number (must be a factor of 12: 1, 2, 3, 4, 6, 12)
columns: "4"
connectivityCheck: false

defaults:
  layout: columns #columns or list
  colorTheme: dark #auto, light, or dark

# Optional custom stylesheet
stylesheet:
  - "assets/custom.css"

# Optional theming
# 'default' or one of the themes available in 'src/assets/themes'
theme: default
colors:
  light:
    highlight-primary: "#323946"
    highlight-secondary: "#323946"
    highlight-hover: "#323946"
    background: "#2E3440"
    card-background: "#323946"
    text: "#81A1C1"
    text-header: "#81A1C1"
    text-title: "#D8DEE9"
    text-subtitle: "#ECEFF4"
    status-offline: "#BF616A"
    status-online: "#A3BE8C"

  dark:
    highlight-primary: "#323946"
    highlight-secondary: "#81a1c1"
    highlight-hover: "#323946"
    background: "#2E3440"
    card-background: "#323946"
    text: "#81A1C1"
    text-header: "#81A1C1"
    text-title: "#D8DEE9"
    text-subtitle: "#ECEFF4"
    status-offline: "#BF616A"
    status-online: "#A3BE8C"

